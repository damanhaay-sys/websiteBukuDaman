<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Literasi Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6de7ff;
            --accent-dark: #3fabb0;
            --text-light: #f5f0e8;
            --text-dim: rgba(245, 255, 255, 0.6);
            --card-bg: rgba(255, 255, 255, 0.406);
            --card-border: rgb(255, 255, 255);
            --overlay-dark: rgba(0,0,0,0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* ── BACKGROUND LAYER ── */
        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #1a1008 url('') center/cover no-repeat;
            transition: background-image 0.6s ease;
        }
        #bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--overlay-dark);
            backdrop-filter: blur(2px);
        }

        /* Default decorative BG jika belum ada wallpaper */
        #bg-layer.default-bg {
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(120,60,0,0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(80,40,0,0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0d0804 0%, #1a100a 40%, #0f0c08 100%);
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 128px;
        }

        /* ── MAIN WRAPPER ── */
        .wrapper {
            position: relative;
            z-index: 2;
            padding: 0 30px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 70px 0 50px;
            position: relative;
        }
        header::before {
            content: '✦';
            display: block;
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 18px;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform: scale(1); }
            50% { opacity:0.5; transform: scale(0.85); }
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 900;
            letter-spacing: 0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, #f5e6c8 0%, var(--accent) 50%, #e8c97a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            margin-top: 14px;
            color: var(--text-dim);
            font-size: 1.05rem;
            font-style: italic;
            letter-spacing: 0.05em;
        }
        .header-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 22px auto 0;
        }

        /* ── WALLPAPER PANEL ── */
        .wp-panel {
            background: rgba(10,7,4,0.7);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 22px 28px;
            margin-bottom: 45px;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .wp-panel-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .wp-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }
        .wp-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .wp-btn:hover, .wp-btn.active {
            border-color: var(--accent);
            transform: scale(1.1);
        }
        .wp-btn span {
            position: absolute;
            inset: 0;
            display: block;
        }
        .wp-upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: #1a0e04;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .wp-upload-label:hover { opacity: 0.85; }
        #wp-upload { display: none; }

        /* Preset gradients */
        .preset-1 span { background: linear-gradient(135deg, #0d0804, #2a1505); }
        .preset-2 span { background: linear-gradient(135deg, #04080d, #051525); }
        .preset-3 span { background: linear-gradient(135deg, #080d04, #142005); }
        .preset-4 span { background: linear-gradient(135deg, #1a0422, #080312); }
        .preset-5 span { background: linear-gradient(135deg, #0d0808, #220808); }
        .preset-6 span { background: linear-gradient(135deg, #080808, #1a1a1a); }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }
        .stat-chip {
            background: rgba(201,169,110,0.12);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.82rem;
            color: var(--text-dim);
            letter-spacing: 0.06em;
        }
        .stat-chip strong {
            color: var(--accent);
            font-size: 1rem;
        }

        /* ── SEARCH / FILTER ── */
        .toolbar {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 360px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 11px 18px;
            color: var(--text-light);
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box::placeholder { color: var(--text-dim); }
        .search-box:focus { border-color: var(--accent); }

        /* ── GALLERY ── */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 22px;
        }

        /* ── BOOK CARD ── */
        .book-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            animation: fadeUp 0.5s ease both;
        }
        .book-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.4);
            border-color: rgba(201,169,110,0.5);
        }
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .book-image {
            width: 100%;
            height: 250px;
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--card-border);
        }
        .book-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .book-image img.loaded { display: block; }

        .placeholder-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: rgba(201,169,110,0.4);
            transition: color 0.2s;
        }
        .book-card:hover .placeholder-icon { color: rgba(201,169,110,0.7); }
        .placeholder-icon svg { width: 44px; height: 44px; }
        .placeholder-icon span {
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Slot number badge */
        .slot-num {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.7rem;
            color: var(--accent);
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* Status badge */
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .status-badge.sudah-baca { background: rgba(80,180,80,0.25); color: #7de87d; border: 1px solid rgba(80,180,80,0.4); }
        .status-badge.sedang-baca { background: rgba(201,169,110,0.25); color: var(--accent); border: 1px solid var(--card-border); }
        .status-badge.belum-baca { background: rgba(120,120,120,0.2); color: #aaa; border: 1px solid rgba(120,120,120,0.3); }

        .book-info {
            padding: 14px 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text-light);
            line-height: 1.35;
        }
        .book-author {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.04em;
            font-style: italic;
        }
        .book-rating {
            font-size: 0.75rem;
            color: #e8c97a;
            margin-top: 2px;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #12090502;
            background: linear-gradient(145deg, rgba(30,18,8,0.97), rgba(20,12,4,0.98));
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 460px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }
        .modal h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.4rem;
            margin-bottom: 24px;
        }
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            color: var(--text-dim); font-size: 1.4rem;
            cursor: pointer; line-height: 1;
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--accent); }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 7px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-light);
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        .form-group select option { background: #1a1008; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .modal-img-preview {
            width: 100%;
            height: 140px;
            background: rgba(255,255,255,0.04);
            border: 1px dashed var(--card-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 0.82rem;
            margin-bottom: 14px;
            overflow: hidden;
            cursor: pointer;
        }
        .modal-img-preview img { width:100%; height:100%; object-fit: cover; }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-save {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: #1a0e04;
            border: none;
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.85; }
        .btn-clear {
            padding: 12px 18px;
            background: rgba(255,80,80,0.15);
            color: #ff8080;
            border: 1px solid rgba(255,80,80,0.3);
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-clear:hover { background: rgba(255,80,80,0.25); }

        /* ── FOOTER ── */
        footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 0 30px;
            color: rgba(201,169,110,0.35);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        footer span { color: var(--accent); }

        /* Responsive */
        @media (max-width: 600px) {
            .wrapper { padding: 0 16px 50px; }
            header h1 { font-size: 2rem; }
            .wp-panel { padding: 16px 18px; }
            .gallery-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
        }
    </style>
</head>
<body>

<div id="bg-layer" class="default-bg"></div>

<div class="wrapper">

    <!-- HEADER -->
    <header>
        <h1>Koleksi Buku Daman</h1>
        <p>Melalui membaca kita akan melihat peradaban dunia.</p>
        <div class="header-line"></div>
    </header>

    <!-- WALLPAPER PANEL -->
    <div class="wp-panel">
        <div class="wp-panel-title">🎨 Latar Belakang</div>
        <div class="wp-presets">
            <button class="wp-btn preset-1 active" title="Amber Dark" onclick="setPreset(this, 'radial-gradient(ellipse at 20% 50%, rgba(120,60,0,0.4) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(80,40,0,0.3) 0%, transparent 50%), linear-gradient(135deg, #0d0804 0%, #1a100a 40%, #0f0c08 100%)')"><span></span></button>
            <button class="wp-btn preset-2" title="Midnight Blue" onclick="setPreset(this, 'radial-gradient(ellipse at 30% 60%, rgba(0,40,100,0.5) 0%, transparent 55%), linear-gradient(135deg, #020508 0%, #040d1a 100%)')"><span></span></button>
            <button class="wp-btn preset-3" title="Forest" onclick="setPreset(this, 'radial-gradient(ellipse at 50% 30%, rgba(20,80,20,0.5) 0%, transparent 60%), linear-gradient(135deg, #020805 0%, #061408 100%)')"><span></span></button>
            <button class="wp-btn preset-4" title="Purple Night" onclick="setPreset(this, 'radial-gradient(ellipse at 40% 50%, rgba(80,0,120,0.5) 0%, transparent 60%), linear-gradient(135deg, #060208 0%, #100418 100%)')"><span></span></button>
            <button class="wp-btn preset-5" title="Deep Red" onclick="setPreset(this, 'radial-gradient(ellipse at 60% 40%, rgba(120,10,10,0.5) 0%, transparent 55%), linear-gradient(135deg, #080202 0%, #180404 100%)')"><span></span></button>
            <button class="wp-btn preset-6" title="Charcoal" onclick="setPreset(this, 'linear-gradient(135deg, #080808 0%, #1c1c1c 100%)')"><span></span></button>
        </div>
        <label class="wp-upload-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Foto
            <input type="file" id="wp-upload" accept="image/*">
        </label>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-chip">Total Slot <strong>50</strong></div>
        <div class="stat-chip" id="statFilled">Terisi <strong>0</strong></div>
        <div class="stat-chip" id="statRead">Sudah Baca <strong>0</strong></div>
        <div class="stat-chip" id="statReading">Sedang Dibaca <strong>0</strong></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍  Cari judul atau pengarang...">
    </div>

    <!-- GALLERY -->
    <div class="gallery-container" id="bookGallery"></div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 &nbsp;<span>Pameran Buku Pribadi</span>&nbsp; · Klik kartu untuk mengisi data</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2 id="modalTitle">Edit Buku</h2>

        <div class="modal-img-preview" id="imgPreview" onclick="document.getElementById('imgInput').click()">
            <span>Klik untuk pilih foto sampul</span>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display:none">

        <div class="form-group">
            <label>Judul Buku</label>
            <input type="text" id="inputTitle" placeholder="Masukkan judul buku...">
        </div>
        <div class="form-group">
            <label>Pengarang</label>
            <input type="text" id="inputAuthor" placeholder="Nama pengarang...">
        </div>
        <div class="form-group">
            <label>Status Membaca</label>
            <select id="inputStatus">
                <option value="">— Pilih Status —</option>
                <option value="sudah-baca">Sudah Dibaca</option>
                <option value="sedang-baca">Sedang Dibaca</option>
                <option value="belum-baca">Belum Dibaca</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rating (1–5 ⭐)</label>
            <input type="number" id="inputRating" min="1" max="5" placeholder="misal: 4">
        </div>
        <div class="form-group">
            <label>Catatan Singkat</label>
            <textarea id="inputNote" placeholder="Kesan atau catatan tentang buku ini..."></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn-save" onclick="saveBook()">Simpan</button>
            <button class="btn-clear" onclick="clearBook()">Hapus</button>
        </div>
    </div>
</div>

<script>
    // ── DATA ──
    const TOTAL = 50;
    let books = JSON.parse(localStorage.getItem('buku-koleksi') || 'null') || Array.from({length: TOTAL}, () => ({
        title: '', author: '', status: '', rating: '', note: '', img: ''
    }));

    let currentSlot = null;
    let tempImg = '';

    // ── RENDER ──
    function render(filter = '') {
        const container = document.getElementById('bookGallery');
        container.innerHTML = '';
        const lc = filter.toLowerCase();

        books.forEach((b, i) => {
            const matchTitle  = b.title.toLowerCase().includes(lc);
            const matchAuthor = b.author.toLowerCase().includes(lc);
            if (filter && !matchTitle && !matchAuthor) return;

            const stars = b.rating ? '⭐'.repeat(Math.min(5, parseInt(b.rating))) : '';
            const card = document.createElement('div');
            card.className = 'book-card';
            card.style.animationDelay = (i % 20 * 0.04) + 's';
            card.onclick = () => openModal(i);

            card.innerHTML = `
                <div class="book-image">
                    <span class="slot-num">#${String(i+1).padStart(2,'0')}</span>
                    ${b.status ? `<span class="status-badge ${b.status}">${b.status === 'sudah-baca' ? '✓ Baca' : b.status === 'sedang-baca' ? '📖 Baca' : '○ Antri'}</span>` : ''}
                    ${b.img
                        ? `<img src="${b.img}" alt="${b.title}" class="loaded">`
                        : `<div class="placeholder-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="2" width="18" height="20" rx="2"/>
                                <path d="M7 6h10M7 10h10M7 14h6"/>
                            </svg>
                            <span>Slot ${i+1}</span>
                           </div>`
                    }
                </div>
                <div class="book-info">
                    <div class="book-title">${b.title || '<span style="color:var(--text-dim);font-style:italic;font-size:0.82rem">Kosong — klik untuk isi</span>'}</div>
                    ${b.author ? `<div class="book-author">${b.author}</div>` : ''}
                    ${stars ? `<div class="book-rating">${stars}</div>` : ''}
                </div>`;
            container.appendChild(card);
        });

        updateStats();
    }

    function updateStats() {
        const filled  = books.filter(b => b.title).length;
        const read    = books.filter(b => b.status === 'sudah-baca').length;
        const reading = books.filter(b => b.status === 'sedang-baca').length;
        document.getElementById('statFilled').innerHTML   = `Terisi <strong>${filled}</strong>`;
        document.getElementById('statRead').innerHTML     = `Sudah Baca <strong>${read}</strong>`;
        document.getElementById('statReading').innerHTML  = `Sedang Dibaca <strong>${reading}</strong>`;
    }

    // ── MODAL ──
    function openModal(i) {
        currentSlot = i;
        tempImg = books[i].img || '';
        const b = books[i];

        document.getElementById('modalTitle').textContent = `Slot #${String(i+1).padStart(2,'0')}`;
        document.getElementById('inputTitle').value  = b.title;
        document.getElementById('inputAuthor').value = b.author;
        document.getElementById('inputStatus').value = b.status;
        document.getElementById('inputRating').value = b.rating;
        document.getElementById('inputNote').value   = b.note;

        const prev = document.getElementById('imgPreview');
        prev.innerHTML = tempImg
            ? `<img src="${tempImg}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
            : '<span>Klik untuk pilih foto sampul</span>';

        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
        currentSlot = null; tempImg = '';
    }

    function saveBook() {
        books[currentSlot] = {
            title:  document.getElementById('inputTitle').value.trim(),
            author: document.getElementById('inputAuthor').value.trim(),
            status: document.getElementById('inputStatus').value,
            rating: document.getElementById('inputRating').value,
            note:   document.getElementById('inputNote').value.trim(),
            img:    tempImg
        };
        localStorage.setItem('buku-koleksi', JSON.stringify(books));
        closeModal();
        render(document.getElementById('searchInput').value);
    }

    function clearBook() {
        books[currentSlot] = { title:'', author:'', status:'', rating:'', note:'', img:'' };
        localStorage.setItem('buku-koleksi', JSON.stringify(books));
        closeModal();
        render(document.getElementById('searchInput').value);
    }

    // ── IMAGE INPUT ──
    document.getElementById('imgInput').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            const prev = document.getElementById('imgPreview');
            prev.innerHTML = `<img src="${tempImg}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`;
        };
        reader.readAsDataURL(file);
    });

    // ── SEARCH ──
    document.getElementById('searchInput').addEventListener('input', function() {
        render(this.value);
    });

    // ── WALLPAPER ──
    const bgLayer = document.getElementById('bg-layer');

    function setPreset(btn, gradient) {
        document.querySelectorAll('.wp-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        bgLayer.className = '';
        bgLayer.style.background = gradient;
        localStorage.setItem('wp-type', 'gradient');
        localStorage.setItem('wp-value', gradient);
    }

    document.getElementById('wp-upload').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            bgLayer.className = '';
            bgLayer.style.background = `url('${e.target.result}') center/cover no-repeat`;
            bgLayer.style.backgroundSize = 'cover';
            document.querySelectorAll('.wp-btn').forEach(b => b.classList.remove('active'));
            localStorage.setItem('wp-type', 'image');
            localStorage.setItem('wp-value', e.target.result);
        };
        reader.readAsDataURL(file);
    });

    // ── RESTORE WALLPAPER ──
    const wpType = localStorage.getItem('wp-type');
    const wpVal  = localStorage.getItem('wp-value');
    if (wpType && wpVal) {
        if (wpType === 'gradient') {
            bgLayer.className = '';
            bgLayer.style.background = wpVal;
        } else {
            bgLayer.className = '';
            bgLayer.style.background = `url('${wpVal}') center/cover no-repeat`;
        }
    }

    // ── CLOSE MODAL ON OVERLAY CLICK ──
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ── INIT ──
    render();
</script>
</body>
</html>
